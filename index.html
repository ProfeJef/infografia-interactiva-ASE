<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currículo Vivo: Infografía RPG</title>
    <!-- Fuentes Pixeladas -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <!-- Hojas de estilo -->
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/rpg-ui.css">
</head>
<body>

    <!-- Barra de Estado UI (Fija superior) -->
    <header class="status-bar">
        <div class="hud-element">
            <span class="hud-label">ASE (Aprendizaje Social y Emocional)</span>
            <div class="progress-container">
                <div class="progress-bar" id="ase-bar"></div>
            </div>
            <span class="hud-percent" id="ase-percent">0%</span>
        </div>
    </header>

    <!-- Contenedor Principal del Mapa -->
    <main class="world-viewport">
        <div class="map-container" id="map-container">
            
            <!-- Camino dibujado con CSS -->
            <div class="path-line"></div>

            <!-- El Avatar del Jugador (SVG Inline Pixel Art) -->
            <div class="avatar idle" id="player-avatar">
                <svg width="40" height="40" viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="1" width="4" height="3" fill="#ffb8b8"/> <!-- Cara -->
                    <rect x="2" y="0" width="6" height="1" fill="#8b4513"/> <!-- Sombrero/Pelo -->
                    <rect x="2" y="1" width="1" height="1" fill="#8b4513"/>
                    <rect x="7" y="1" width="1" height="1" fill="#8b4513"/>
                    <rect x="3" y="4" width="4" height="4" fill="#3498db"/> <!-- Cuerpo -->
                    <rect x="2" y="4" width="1" height="3" fill="#ffb8b8"/> <!-- Brazo Izq -->
                    <rect x="7" y="4" width="1" height="3" fill="#ffb8b8"/> <!-- Brazo Der -->
                    <rect x="3" y="8" width="1" height="2" fill="#2c3e50"/> <!-- Pierna Izq -->
                    <rect x="6" y="8" width="1" height="2" fill="#2c3e50"/> <!-- Pierna Der -->
                </svg>
                <div class="player-shadow"></div>
            </div>

            <!-- Las estaciones se renderizarán dinámicamente aquí vía JS -->
        </div>
    </main>

    <!-- Modal tipo Pergamino RPG -->
    <div class="modal-overlay hidden" id="dialog-modal">
        <div class="rpg-dialog-box">
            <h2 id="dialog-title">Título</h2>
            <h3 id="dialog-subtitle">Responsable</h3>
            <p id="dialog-text">Texto de la misión pedagógica.</p>
            <button class="rpg-btn" id="close-dialog-btn">Continuar</button>
        </div>
    </div>

    <!-- Script Principal (Módulo) -->
    <script type="module" src="./js/app.js"></script>
</body>
</html>
